<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JioMart Clone - Home</title>
    <style>
        /* पूरे पेज का बेसिक डिज़ाइन */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }

        /* ऊपर का नेविगेशन बार (Header) */
        header {
            background-color: #008ccf; /* JioMart का नीला रंग */
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        /* सर्च बार का डिज़ाइन */
        .search-container {
            flex-grow: 1;
            margin: 0 30px;
            display: flex;
        }

        .search-container input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        /* कार्ट और प्रोफाइल आइकॉन/बटन */
        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icons span {
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* मेन कंटेंट का हिस्सा */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        /* प्रोडक्ट्स दिखाने के लिए ग्रिड (Grid) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* प्रोडक्ट कार्ड का डिज़ाइन */
        .product-card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px); /* माउस ले जाने पर कार्ड थोड़ा ऊपर उठेगा */
        }

        /* प्रोडक्ट की फोटो के लिए जगह */
        .product-image {
            width: 100px;
            height: 100px;
            background-color: #e0e0e0;
            margin: 0 auto 15px auto;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #777;
        }

        .product-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 20px;
            color: #d11243; /* कीमत के लिए लाल/गुलाबी रंग */
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Add to Cart बटन */
        .add-to-cart-btn {
            background-color: #008ccf;
            color: white;
            border: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .add-to-cart-btn:hover {
            background-color: #006b9e;
        }
    </style>
</head>
<body>

    <!-- Header / Navbar -->
    <header>
        <div class="logo">Vasu Mart🛍️</div>
        <div class="search-container">
            <input type="text" placeholder="Search for Groceries, Electronics, Fashion...">
        </div>
        <div class="header-icons">
            <span>👤 Sign In</span>
            <span>🛒 Cart</span>
        </div>
    </header>

    <!-- Main Content (Products) -->
    <div class="container">
        <h2>Top Offers</h2>
        
        <div class="product-grid">
            <!-- Product 1 -->
            <div class="product-card">
                <div class="product-image">🍎 Image</div>
                <div class="product-title">Fresh Apple (1 kg)</div>
                <div class="product-price">₹150</div>
                <button class="add-to-cart-btn">Add to Cart</button>
            </div>

            <!-- Product 2 -->
            <div class="product-card">
                <div class="product-image">🌾 Image</div>
                <div class="product-title">Aashirvaad Atta (5 kg)</div>
                <div class="product-price">₹210</div>
                <button class="add-to-cart-btn">Add to Cart</button>
            </div>

            <!-- Product 3 -->
            <div class="product-card">
                <div class="product-image">🧈 Image</div>
                <div class="product-title">Amul Butter (500g)</div>
                <div class="product-price">₹275</div>
                <button class="add-to-cart-btn">Add to Cart</button>
            </div>

            <!-- Product 4 -->
            <div class="product-card">
                <div class="product-image">🧅 Image</div>
                <div class="product-title">Fresh Onion (1 kg)</div>
                <div class="product-price">₹40</div>
                <button class="add-to-cart-btn">Add to Cart</button>
            </div>
        </div>
    </div>

</body>
</html>
