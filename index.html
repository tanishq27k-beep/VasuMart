  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ---------- FIREBASE SETUP (mat chhedo) ----------
    const firebaseConfig = {
      apiKey: "AIzaSyCTWmzMsNF58HVkj6eVe0aAJPpkcBIeCUU",
      authDomain: "myapps-79dd3.firebaseapp.com",
      databaseURL: "https://myapps-79dd3-default-rtdb.firebaseio.com",
      projectId: "myapps-79dd3",
      storageBucket: "myapps-79dd3.firebasestorage.app",
      messagingSenderId: "1032448815652",
      appId: "1:1032448815652:web:513d4f24cef0ffba659eb1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ---------- HELPER FUNCTIONS ----------

    // Fixed path pe data save/overwrite
    function saveData(path, value) {
      set(ref(db, path), value)
        .then(() => console.log("Saved ✔", path, value))
        .catch((err) => console.log("ERROR:", err.message));
    }

    // Naya entry add (auto unique ID) — list jaisa data
    function pushData(path, value) {
      push(ref(db, path), value)
        .then(() => console.log("Added ✔", path, value))
        .catch((err) => console.log("ERROR:", err.message));
    }

    // Data ek baar padhna
    function readData(path, callback) {
      get(ref(db, path))
        .then((snapshot) => callback(snapshot.val()))
        .catch((err) => console.log("ERROR:", err.message));
    }

    // Data delete
    function deleteData(path) {
      remove(ref(db, path))
        .then(() => console.log("Deleted ✔", path))
        .catch((err) => console.log("ERROR:", err.message));
    }

    // Realtime listen — data change hote hi auto trigger
    function listenData(path, callback) {
      onValue(ref(db, path), (snapshot) => callback(snapshot.val()));
    }

    // ---------- BUTTONS ----------

    // btn1 -> "bt" path pe value save karo
   
    const ini = document.getElementById("ini");
    const int = document.getElementById("int");
    const inw = document.getElementById("inw");
    const inp = document.getElementById("inp");
    
    const inmrp = document.getElementById("inmrp");
    const indis = document.getElementById("indis");
    const indet = document.getElementById("indet");
    
    document.getElementById("btn1").addEventListener("click", () => {
      const url = document.getElementById("ini").value.trim();
     const m=document.getElementById("num").value;
      saveData("img"+m, url);
    });
    
     document.getElementById("btn2").addEventListener("click", () => {
      const m=document.getElementById("num").value;
      saveData("title"+m,int.value);
     });
    
    document.getElementById("btn3").addEventListener("click", () => {
      const m=document.getElementById("num").value;
      saveData("weight"+m,inw.value);
    });
    
     document.getElementById("btn4").addEventListener("click", () => {
      const m=document.getElementById("num").value;
      saveData("price"+m,inp.value);
    });
    
    document.getElementById("btn5").addEventListener("click", () => {
      const m=document.getElementById("num").value;
      saveData("mrpd"+m,inmrp.value);
    });
    document.getElementById("btn6").addEventListener("click", () => {
      const m=document.getElementById("num").value;
      saveData("discountd"+m,indis.value);
    });
    document.getElementById("btn7").addEventListener("click", () => {
      const m=document.getElementById("num").value;
      saveData("detailed"+m,indet.value);
    });



    // ---------- OUTPUT: "ans" real-time update ----------
 const numInput = document.getElementById("num");

let unsubWeight, unsubPrice, unsubTitle, unsubImg,unsubmrp,unsubdiscount,unsubdetaile;

function attachListeners(m) {
  // Purane listeners hatao (agar unsubscribe function available ho)
  if (unsubWeight) unsubWeight();
  if (unsubPrice) unsubPrice();
  if (unsubTitle) unsubTitle();
  if (unsubImg) unsubImg();
  if (unsubmrp) unsubmrp();
  if (unsubdiscount) unsubdiscount();
  if (unsubdetaile) unsubdetaile();

  unsubWeight = listenData("weight" + m, (val) => {
    document.getElementById("weight").innerText = val;
  });

  unsubPrice = listenData("price" + m, (val) => {
    document.getElementById("price").innerText = val;
  });

  unsubTitle = listenData("title" + m, (val) => {
    document.getElementById("name").innerText = val;
  });

  unsubImg = listenData("img" + m, (url) => {
    document.getElementById("img1").src = url || "";
  });
  
  unsubmrp = listenData("mrpd" + m, (val) => {
    document.getElementById("mrpd1").innerText = val;
  });
  unsubdiscount = listenData("discountd" + m, (val) => {
    document.getElementById("discountd1").innerText = val;
  });
  unsubdetaile = listenData("detailed" + m, (val) => {
    document.getElementById("detailed1").innerText = val;
  });
}

// Page load pe default num=1 se start
attachListeners(numInput.value || 1);

// num change hote hi live update
numInput.addEventListener("input", () => {
  const m = numInput.value;
  if (m) attachListeners(m);
});
    
                          </script>
